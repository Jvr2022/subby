id: gitbook
name: GitBook space missing
service: GitBook
severity: medium
confidence: medium
description: A host points at GitBook and GitBook does not have a published space for it.
takeover: true
requires:
  - cname
  - http
matchers:
  cname:
    contains:
      - gitbook.io
      - hosting.gitbook.io
      - www.gitbook.com
  http:
    body:
      contains:
        - The page you are looking for does not exist
        - This space could not be found
references:
  - https://gitbook.com/docs/publishing-documentation/custom-domain
